services:
  localstack:
    image: localstack/localstack:3.5
    container_name: test-feedz-localstack
    environment:
      SERVICES: sqs
      DEBUG: "0"
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: test-feedz-backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 3000
      OBS_SERVICE_NAME: vehicle-api
      OBS_APP_NAME: test-feedz
      DATABASE_URL: file:/app/data/dev.db
      NODE_ENV: production
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      SQS_ENDPOINT: http://localstack:4566
      SQS_IMPORT_QUEUE_URL: http://localstack:4566/000000000000/vehicle-import-queue
    ports:
      - "3000:3000"
    command: ["sh", "-c", "npx prisma db push && node dist/main"]
    volumes:
      - backend_sqlite_data:/app/data
    depends_on:
      localstack:
        condition: service_healthy
    restart: unless-stopped

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: test-feedz-backend-worker
    command: ["sh", "-c", "npx prisma db push && node dist/main.worker.js"]
    env_file:
      - ./backend/.env
    environment:
      OBS_SERVICE_NAME: vehicle-worker
      OBS_APP_NAME: test-feedz
      DATABASE_URL: file:/app/data/dev.db
      NODE_ENV: production
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      SQS_ENDPOINT: http://localstack:4566
      SQS_IMPORT_QUEUE_URL: http://localstack:4566/000000000000/vehicle-import-queue
      IMPORT_WORKER_TCP_PORT: "39999"
      IMPORT_WORKER_METRICS_PORT: "9100"
    ports:
      - "39999:39999"
      - "9100:9100"
    volumes:
      - backend_sqlite_data:/app/data
    depends_on:
      localstack:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: test-feedz-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: test-feedz-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
      - backend-worker
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.2.0
    container_name: test-feedz-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  backend_sqlite_data:
  prometheus_data:
  grafana_data:
