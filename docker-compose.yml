services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: test-feedz-backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 3000
      DATABASE_URL: file:/app/prisma/dev.db
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - backend_sqlite_data:/app/prisma
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: test-feedz-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_sqlite_data:
