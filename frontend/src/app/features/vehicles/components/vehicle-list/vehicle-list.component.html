<div class="grid">
  @for (vehicle of vehicles(); track vehicle.id) {
    <mat-card class="vehicle-card" appearance="outlined">
      <mat-card-header>
        <mat-card-title>{{ vehicle.brand }} {{ vehicle.model }}</mat-card-title>
        <mat-card-subtitle>{{ vehicle.licensePlate }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p><strong>Ano:</strong> {{ vehicle.year }}</p>
      </mat-card-content>

      <mat-card-actions align="end">
        <button mat-button (click)="edit.emit(vehicle)">Editar</button>
        <button mat-button (click)="remove.emit(vehicle)">Excluir</button>
      </mat-card-actions>
    </mat-card>
  }
</div>
