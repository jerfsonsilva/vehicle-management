<h2 mat-dialog-title>Importar CSV</h2>

<mat-dialog-content>
  <p>Selecione um arquivo CSV para importar veículos.</p>
  <input type="file" accept=".csv,text/csv" (change)="onFileSelected($event)" />

  @if (selectedFile()) {
    <p class="file-name">Arquivo: {{ selectedFile()?.name }}</p>
  }

  @if (errorMessage()) {
    <p class="error-message">{{ errorMessage() }}</p>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button (click)="confirm()">Importar</button>
</mat-dialog-actions>
