<app-page-shell
  title="Frota de veículos"
  subtitle="Gestão de veículos simples, moderna e escalável."
>
  <section class="toolbar">
    <button mat-flat-button (click)="openCreateModal()">Cadastrar veículo</button>
  </section>

  @if (store.loading()) {
    <section class="loading">
      <mat-spinner diameter="34" />
    </section>
  } @else if (store.loaded() && !store.vehicles().length) {
    <section class="empty-state">
      <h3>Nenhum veículo cadastrado</h3>
      <p>Cadastre seu primeiro veículo para começar.</p>
    </section>
  } @else {
    <app-vehicle-list
      [vehicles]="store.vehicles()"
      (edit)="openEditModal($event)"
      (remove)="confirmDelete($event)"
    />
  }
</app-page-shell>
