global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: backend-api
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:3000']

  - job_name: backend-worker
    metrics_path: /metrics
    static_configs:
      - targets: ['backend-worker:9100']
